// ── TOAST ─────────────────────────────────────────────────────
let _tt;
function toast(msg, err) {
    const el = document.getElementById("toast");
    el.textContent = (err ? "⚠️ " : "✅ ") + msg;
    el.className = "toast show" + (err ? " err" : "");
    clearTimeout(_tt);

// ── UTIL ──────────────────────────────────────────────────────
function esc(s) {
    return String(s||"").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
}
function today() { return new Date().toISOString().slice(0,10); }
function thisMonth() { return new Date().toISOString().slice(0,7); }

// ── DB HELPERS ────────────────────────────────────────────────
async function dbSiswa(kelas) {
    const {data, error} = await sb.from("siswa").select("id,nama").eq("kelas", kelas).order("nama");
    if (error) { toast("Gagal muat siswa: " + error.message, 1); return []; }
    return data;
}
async function dbTambah(kelas, nama) {
    const {data, error} = await sb.from("siswa").insert({kelas, nama}).select().single();
    if (error) { toast("Gagal tambah: " + error.message, 1); return null; }
    toast('"' + nama + '" ditambahkan');
    return data;
}
async function dbHapus(id, nama) {
    const {error} = await sb.from("siswa").delete().eq("id", id);
    if (error) { toast("Gagal hapus: " + error.message, 1); return false; }
    toast('"' + nama + '" dihapus');
    return true;
}
async function dbGetAbsen(kelas, tanggal) {
    const {data, error} = await sb.from("absensi").select("santri_id,status").eq("kelas", kelas).eq("tanggal", tanggal);
    if (error) { toast("Gagal muat absensi: " + error.message, 1); return {}; }
    const m = {};
    data.forEach(r => m[r.santri_id] = r.status);
    return m;
}
async function dbSimpan(records) {
    const {error} = await sb.from("absensi").upsert(records, {onConflict: "kelas,tanggal,santri_id"});
    if (error) { toast("Gagal simpan: " + error.message, 1); return false; }
    toast("Tersimpan ✓");
    return true;
}
async function dbRekap(kelas, bulan) {
    const [y, m] = bulan.split("-");
    const days = new Date(+y, +m, 0).getDate();
    const start = y+"-"+m+"-01";
    const end   = y+"-"+m+"-"+String(days).padStart(2,"0");
    const [{data:siswa,error:e1}, {data:abs,error:e2}] = await Promise.all([
        sb.from("siswa").select("id,nama").eq("kelas",kelas).order("nama"),
        sb.from("absensi").select("santri_id,tanggal,status").eq("kelas",kelas).gte("tanggal",start).lte("tanggal",end)
    ]);
    if (e1||e2) { toast("Gagal muat rekap", 1); return null; }
    const map = {};
    (abs||[]).forEach(r => { if(!map[r.santri_id]) map[r.santri_id]={}; map[r.santri_id][r.tanggal]=r.status; });
    const allDates = [];
    for (let d=1; d<=days; d++) allDates.push(y+"-"+m+"-"+String(d).padStart(2,"0"));
    const dates = allDates.filter(tgl => (siswa||[]).some(s => map[s.id]?.[tgl]));
    return {siswa: siswa||[], map, dates};
}

// ── HALAMAN: DATA SISWA ───────────────────────────────────────
function pgSiswa() {
    let kelas = "A";
    function draw() {
        panel.innerHTML =
            '<h2><i class="fas fa-users-cog"></i> Data Siswa</h2>' +
            '<div class="kelas-tabs" id="kTabs"></div>' +
            '<div class="form-row">' +
            '<input type="text" id="inNama" placeholder="Nama santri baru" style="flex:1;min-width:160px">' +
            '<button class="btn btn-green" id="btnTambah"><i class="fas fa-plus"></i> Tambah</button>' +
            '</div>' +
            '<div id="tblWrap"><div class="loading"><i class="fas fa-spinner fa-spin"></i> Memuat...</div></div>';

        // Kelas tabs
        const tabs = document.getElementById("kTabs");
        ["A","B","C","D"].forEach(k => {
            const b = document.createElement("button");
            b.className = "tab-btn" + (k===kelas?" active":"");
            b.textContent = "Kelas " + k;
            b.addEventListener("click", () => { kelas=k; draw(); });
            tabs.appendChild(b);
        });

        document.getElementById("btnTambah").addEventListener("click", async () => {
            const inp = document.getElementById("inNama");
            const nama = inp.value.trim();
            if (!nama) return toast("Nama tidak boleh kosong", 1);
            inp.disabled = true;
            await dbTambah(kelas, nama);
            inp.value = "";
            inp.disabled = false;
            await loadTbl();
        });

        loadTbl();
    }
    async function loadTbl() {
        const wrap = document.getElementById("tblWrap");
        if (!wrap) return;
        wrap.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i> Memuat...</div>';
        const list = await dbSiswa(kelas);
        if (!list.length) { wrap.innerHTML='<p style="padding:20px;color:#888">Belum ada siswa. Tambah di atas.</p>'; return; }
        wrap.innerHTML =
            '<div class="tbl-wrap"><table>' +
            '<thead><tr><th>No</th><th>Nama</th><th>Aksi</th></tr></thead>' +
            '<tbody>' + list.map((s,i) =>
                '<tr><td>'+(i+1)+'</td><td style="text-align:left">'+esc(s.nama)+'</td>' +
                '<td><button class="btn btn-red btn-sm hapus-btn" data-id="'+s.id+'" data-nama="'+esc(s.nama)+'">'+
                '<i class="fas fa-trash"></i> Hapus</button></td></tr>'
            ).join("") + '</tbody></table></div>';
        wrap.querySelectorAll(".hapus-btn").forEach(b => {
            b.addEventListener("click", async () => {
                if (!confirm('Hapus "'+b.dataset.nama+'"?')) return;
                await dbHapus(b.dataset.id, b.dataset.nama);
                await loadTbl();
            });
        });
    }
    draw();
}

// ── HALAMAN: ABSENSI ─────────────────────────────────────────
function pgAbsen(kelas) {
    let tgl = today();
    function draw() {
        panel.innerHTML =
            '<h2><i class="fas fa-clipboard-check"></i> Absensi Kelas '+kelas+'</h2>' +
            '<div class="toolbar">' +
            '<label>Tanggal:</label>' +
            '<input type="date" id="tglPick" value="'+tgl+'">' +
            '<button class="btn btn-blue" id="btnMuat"><i class="fas fa-sync-alt"></i> Muat</button>' +
            '<button class="btn btn-green" id="btnSimpanSemua"><i class="fas fa-save"></i> Simpan Semua</button>' +
            '</div>' +
            '<div id="absWrap"><div class="loading"><i class="fas fa-spinner fa-spin"></i> Memuat...</div></div>';

        document.getElementById("btnMuat").addEventListener("click", () => {
            tgl = document.getElementById("tglPick").value || tgl;
            loadAbsen();
        });
        document.getElementById("btnSimpanSemua").addEventListener("click", async () => {
            tgl = document.getElementById("tglPick").value || tgl;
            // FIX: only select <tr> rows to avoid duplicate data-sid from buttons
            const rows = document.querySelectorAll("tr[data-sid]");
            if (!rows.length) return toast("Belum ada data", 1);
            const seen = new Set();
            const records = [];
            rows.forEach(r => {
                const sid = parseInt(r.dataset.sid);
                if (seen.has(sid)) return;
                seen.add(sid);
                records.push({
                    kelas, tanggal: tgl,
                    santri_id: sid,
                    status: document.getElementById("sel_"+sid)?.value || "hadir",
                    updated_at: new Date().toISOString()
                });
            });
            await dbSimpan(records);
            loadAbsen();
        });
        loadAbsen();
    }
    async function loadAbsen() {
        const wrap = document.getElementById("absWrap");
        if (!wrap) return;
        wrap.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i> Memuat...</div>';
        const [siswa, absMap] = await Promise.all([dbSiswa(kelas), dbGetAbsen(kelas, tgl)]);
        if (!siswa.length) { wrap.innerHTML='<p style="padding:20px;color:#888">Belum ada siswa. Tambah di menu Data Siswa.</p>'; return; }
        const STATUS = [{v:"hadir",l:"✅ Hadir"},{v:"sakit",l:"🤒 Sakit"},{v:"izin",l:"📝 Izin"},{v:"alpha",l:"❌ Alpha"}];
        wrap.innerHTML =
            '<div class="tbl-wrap"><table>' +
            '<thead><tr><th>No</th><th>Nama</th><th>Status</th><th>Aksi</th></tr></thead>' +
            '<tbody>' + siswa.map((s,i) => {
                const st = absMap[s.id] || "hadir";
                const opts = STATUS.map(x => '<option value="'+x.v+'"'+(st===x.v?" selected":"")+'>'+x.l+'</option>').join("");
                return '<tr data-sid="'+s.id+'"><td>'+(i+1)+'</td><td style="text-align:left">'+esc(s.nama)+'</td>'+
                    '<td><select class="status-sel" id="sel_'+s.id+'">'+opts+'</select></td>'+
                    '<td><button class="btn btn-green btn-sm simpan1-btn" data-sid="'+s.id+'">'+
                    '<i class="fas fa-save"></i> Simpan</button></td></tr>';
            }).join("") + '</tbody></table></div>';
        wrap.querySelectorAll(".simpan1-btn").forEach(b => {
            b.addEventListener("click", async () => {
                const sid = parseInt(b.dataset.sid);
                const sel = document.getElementById("sel_"+sid);
                if (!sel) return;
                await dbSimpan([{kelas, tanggal:tgl, santri_id:sid, status:sel.value, updated_at:new Date().toISOString()}]);
                loadAbsen();
            });
        });
    }
    draw();
}

// ── HALAMAN: LAPORAN ─────────────────────────────────────────
function pgLaporan() {
    let kelas = "A", bulan = thisMonth();
    function draw() {
        panel.innerHTML =
            '<h2><i class="fas fa-chart-pie"></i> Laporan Bulanan</h2>' +
            '<div class="kelas-tabs" id="kTabsLap"></div>' +
            '<div class="toolbar">' +
            '<label>Bulan:</label><input type="month" id="bulanPick" value="'+bulan+'">' +
            '<button class="btn btn-blue" id="btnTampil"><i class="fas fa-chart-bar"></i> Tampilkan Kelas</button>' +
            '<button class="btn btn-teal" id="btnTampilSemua"><i class="fas fa-chart-line"></i> Semua Kelas</button>' +
            '</div>' +
            '<div id="lapOut"></div>' +
            '<div class="foot"><button class="btn btn-dark" id="btnCetak"><i class="fas fa-print"></i> Cetak</button></div>';

        const tabs = document.getElementById("kTabsLap");
        ["A","B","C","D"].forEach(k => {
            const b = document.createElement("button");
            b.className = "tab-btn"+(k===kelas?" active":"");
            b.textContent = "Kelas "+k;
            b.addEventListener("click", () => { kelas=k; draw(); tampilKelas(); });
            tabs.appendChild(b);
        });

        document.getElementById("btnTampil").addEventListener("click", tampilKelas);
        document.getElementById("btnTampilSemua").addEventListener("click", tampilSemua);
        document.getElementById("btnCetak").addEventListener("click", () => {
            const c = document.getElementById("lapOut")?.innerHTML;
            if (!c || c.includes("Belum") || c.includes("Memuat") || c.includes("fa-spin")) return toast("Tampilkan laporan dulu", 1);
            const w = window.open("","_blank");
            w.document.write('<!DOCTYPE html><html><head><title>Laporan Absensi</title><style>body{font-family:sans-serif;padding:20px}table{border-collapse:collapse;width:100%}th,td{border:1px solid #000;padding:6px 8px;text-align:center}th{background:#2c3e50;color:#fff}h3{text-align:center}</style></head><body>'+c+'</body></html>');
            w.document.close(); w.print();
        });
    }
    async function tampilKelas() {
        bulan = document.getElementById("bulanPick")?.value || bulan;
        const out = document.getElementById("lapOut");
        if (!out) return;
        out.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i> Memuat laporan...</div>';
        const r = await dbRekap(kelas, bulan);
        if (!r || !r.siswa.length) { out.innerHTML='<p style="padding:16px;color:#888">Belum ada data untuk Kelas '+kelas+' bulan '+bulan+'.</p>'; return; }
        if (!r.dates.length) { out.innerHTML='<p style="padding:16px;color:#888">Belum ada sesi absensi tercatat bulan '+bulan+'.</p>'; return; }
        const ICON = {hadir:"✅",sakit:"🤒",izin:"📝",alpha:"❌"};
        let html = '<h3 style="margin:12px 0">📊 Kelas '+kelas+' — '+bulan+'</h3><div class="tbl-wrap"><table>' +
            '<thead><tr><th>No</th><th>Nama</th>'+r.dates.map(d=>'<th>'+d.slice(5)+'</th>').join('')+'<th>H</th><th>S</th><th>I</th><th>A</th></tr></thead><tbody>';
        r.siswa.forEach((s,i) => {
            let h=0,sk=0,iz=0,al=0;
            const cells = r.dates.map(d => {
                const st = r.map[s.id]?.[d] || "alpha";
                if(st==="hadir")h++; else if(st==="sakit")sk++; else if(st==="izin")iz++; else al++;
                return '<td>'+ICON[st]+'</td>';
            }).join("");
            html += '<tr><td>'+(i+1)+'</td><td style="text-align:left">'+esc(s.nama)+'</td>'+cells+'<td>'+h+'</td><td>'+sk+'</td><td>'+iz+'</td><td>'+al+'</td></tr>';
        });
        html += '</tbody></table></div><p style="margin-top:8px;font-size:.8rem">✅ Hadir &nbsp;🤒 Sakit &nbsp;📝 Izin &nbsp;❌ Alpha</p>';
        out.innerHTML = html;
    }
    async function tampilSemua() {
        bulan = document.getElementById("bulanPick")?.value || bulan;
        const out = document.getElementById("lapOut");
        if (!out) return;
        out.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i> Memuat semua kelas...</div>';
        const results = await Promise.all(["A","B","C","D"].map(k => dbRekap(k, bulan)));
        let html = '<h3 style="margin:12px 0">📋 Ringkasan Semua Kelas — '+bulan+'</h3><div class="tbl-wrap"><table>' +
            '<thead><tr><th>Kelas</th><th>Jml Santri</th><th>Hadir</th><th>Sakit</th><th>Izin</th><th>Alpha</th></tr></thead><tbody>';
        ["A","B","C","D"].forEach((k,i) => {
            const r = results[i];
            if (!r) { html+='<tr><td>Kelas '+k+'</td><td colspan="5" style="color:red">Gagal muat</td></tr>'; return; }
            let h=0,sk=0,iz=0,al=0;
            r.siswa.forEach(s => r.dates.forEach(d => {
                const st=r.map[s.id]?.[d]||"alpha";
                if(st==="hadir")h++; else if(st==="sakit")sk++; else if(st==="izin")iz++; else al++;
            }));
            html+='<tr><td>Kelas '+k+'</td><td>'+r.siswa.length+'</td><td>'+h+'</td><td>'+sk+'</td><td>'+iz+'</td><td>'+al+'</td></tr>';
        });
        html += '</tbody></table></div>';
        out.innerHTML = html;
    }
    draw();
}

// ── LOGO ─────────────────────────────────────────────────────
const LOGO_BUCKET = "App-assets";
const LOGO_PATH   = "logo/rql_logo";

async function loadLogo() {
    const btn = document.getElementById("logoBtn");
    try {
        const { data } = sb.storage.from(LOGO_BUCKET).getPublicUrl(LOGO_PATH);
        if (data?.publicUrl) {
            const img = new Image();
            img.onload = () => { btn.innerHTML = '<img src="' + data.publicUrl + '?t=' + Date.now() + '">'; };
            img.onerror = () => { /* belum ada logo */ };
            img.src = data.publicUrl + "?t=" + Date.now();
        }
    } catch(e) {}
}

(function(){
    const btn  = document.getElementById("logoBtn");
    const file = document.getElementById("logoFile");
    loadLogo();
    btn.addEventListener("click", () => file.click());
    file.addEventListener("change", async e => {
        const f = e.target.files[0];
        if (!f) return;
        file.value = "";
        if (f.size > 1 * 1024 * 1024) return toast("Logo maksimal 1MB", 1);
        toast("Mengupload logo...");
        btn.style.opacity = "0.5";
        const { error } = await sb.storage.from(LOGO_BUCKET).upload(LOGO_PATH, f, { upsert: true, contentType: f.type });
        btn.style.opacity = "1";
        if (error) { toast("Gagal upload: " + error.message, 1); return; }
        await loadLogo();
        toast("Logo tersimpan di semua device ✓");
    });
})();
