<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Rumah Qur'an Lestari - Absensi Santri</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background: linear-gradient(145deg, #0a3a2c 0%, #1b5e3a 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1300px; margin: 0 auto; }
        .header { background: rgba(255,255,255,0.1); backdrop-filter: blur(8px); border-radius: 40px; padding: 15px 25px; margin-bottom: 30px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 15px; color: white; }
        .logo-area { display: flex; align-items: center; gap: 15px; }
        .logo-img { width: 60px; height: 60px; object-fit: cover; border-radius: 50%; background: white; padding: 5px; cursor: pointer; }
        .logo-placeholder { width: 60px; height: 60px; background: #f4a261; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; cursor: pointer; }
        .title-text h1 { font-size: 1.6rem; }
        .dashboard { display: flex; flex-wrap: wrap; gap: 18px; justify-content: center; margin-bottom: 35px; }
        .dash-btn { background: white; border: none; padding: 14px 28px; border-radius: 60px; font-size: 1.1rem; font-weight: bold; color: #1e4a2f; cursor: pointer; transition: 0.2s; box-shadow: 0 6px 14px rgba(0,0,0,0.2); display: inline-flex; align-items: center; gap: 10px; }
        .dash-btn:hover { transform: translateY(-3px); background: #f4a261; color: white; }
        .card { background: white; border-radius: 28px; padding: 25px; box-shadow: 0 20px 35px rgba(0,0,0,0.2); margin-bottom: 20px; }
        .class-buttons { display: flex; flex-wrap: wrap; gap: 12px; margin: 20px 0; }
        .class-btn { background: #e9ecef; border: none; padding: 10px 25px; border-radius: 40px; font-weight: bold; cursor: pointer; }
        .class-btn.active { background: #2c6e49; color: white; }
        .date-picker { background: #f8f9fa; padding: 15px; border-radius: 20px; display: flex; flex-wrap: wrap; gap: 12px; align-items: center; margin-bottom: 20px; }
        input, select, button { padding: 10px 16px; border-radius: 14px; border: 1px solid #ccc; font-size: 0.95rem; }
        button { background: #2c3e50; color: white; border: none; cursor: pointer; }
        button:hover { background: #1e2f3a; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 12px 8px; text-align: center; vertical-align: middle; }
        th { background: #2c3e50; color: white; }
        .status-select { padding: 6px; border-radius: 20px; }
        .btn-small { padding: 5px 10px; font-size: 0.75rem; margin: 2px; }
        .alert { background: #d1e7dd; padding: 12px; border-radius: 16px; margin: 10px 0; display: none; }
        .student-form { display: flex; gap: 10px; flex-wrap: wrap; margin: 15px 0; }
        .footer-actions { margin-top: 20px; display: flex; gap: 15px; justify-content: flex-end; }
        @media (max-width: 700px) { .dash-btn { padding: 10px 18px; font-size: 0.9rem; } th, td { font-size: 12px; } }
        .loading { text-align: center; padding: 40px; color: #666; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo-area"><div id="logoContainer" class="logo-placeholder"><i class="fas fa-mosque"></i></div><div class="title-text"><h1>Rumah Qur'an Lestari</h1><p>Sistem Absensi Santri • Multi-Device</p></div></div>
        <div><i class="fas fa-cloud-upload-alt"></i> Tersinkronisasi Supabase</div>
    </div>
    <div class="dashboard">
        <button id="btnDataSiswa" class="dash-btn"><i class="fas fa-user-edit"></i> Edit Data Siswa</button>
        <button id="btnKelasA" class="dash-btn"><i class="fas fa-chalkboard-user"></i> Kelas A</button>
        <button id="btnKelasB" class="dash-btn"><i class="fas fa-chalkboard-user"></i> Kelas B</button>
        <button id="btnKelasC" class="dash-btn"><i class="fas fa-chalkboard-user"></i> Kelas C</button>
        <button id="btnKelasD" class="dash-btn"><i class="fas fa-chalkboard-user"></i> Kelas D</button>
        <button id="btnLaporan" class="dash-btn"><i class="fas fa-chart-line"></i> Laporan</button>
    </div>
    <div id="mainPanel" class="card"><div id="dynamicContent"><p style="text-align:center; padding:40px;">✨ Klik menu di atas ✨</p></div></div>
</div>

<script>
    // ========== KONFIGURASI SUPABASE ==========
    const SUPABASE_URL = "https://dkahvnafwxyprouhblhj.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRrYWh2bmFmd3h5cHJvdWhibGhqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1NzA3MDUsImV4cCI6MjA5NDE0NjcwNX0.OgzDRxsPyrQeL8VwS6kgWkkzGAX-y9k-3VOWf3ti3r8";
    // ==========================================

    // ===== DEBUG PANEL (tampil di layar, tidak perlu DevTools) =====
    const _dbg = document.createElement('div');
    _dbg.id = 'debugPanel';
    _dbg.style.cssText = 'position:fixed;bottom:0;left:0;right:0;max-height:220px;overflow-y:auto;background:rgba(0,0,0,0.88);color:#0f0;font-family:monospace;font-size:11px;padding:8px;z-index:9999;display:none;';
    document.body.appendChild(_dbg);
    let _dbgVisible = false;

    // Ketuk pojok kanan bawah 3x untuk tampilkan/sembunyikan debug panel
    let _tapCount = 0;
    document.addEventListener('click', e => {
        if (e.clientX > window.innerWidth * 0.8 && e.clientY > window.innerHeight * 0.8) {
            _tapCount++;
            if (_tapCount >= 3) {
                _tapCount = 0;
                _dbgVisible = !_dbgVisible;
                _dbg.style.display = _dbgVisible ? 'block' : 'none';
            }
        } else { _tapCount = 0; }
    });

    function dbg(msg, color) {
        const line = document.createElement('div');
        line.style.color = color || '#0f0';
        line.textContent = '[' + new Date().toLocaleTimeString() + '] ' + msg;
        _dbg.appendChild(line);
        _dbg.scrollTop = _dbg.scrollHeight;
        console.log(msg);
    }

    // Tangkap semua error JavaScript global
    window.onerror = (msg, src, line) => {
        dbg('JS ERROR: ' + msg + ' (baris ' + line + ')', '#ff4444');
        _dbg.style.display = 'block';
        _dbgVisible = true;
    };
    window.addEventListener('unhandledrejection', e => {
        dbg('PROMISE ERROR: ' + (e.reason?.message || e.reason), '#ff9900');
        _dbg.style.display = 'block';
        _dbgVisible = true;
    });
    // ===============================================================

    // Declare dynamicDiv early so it's available everywhere
    const dynamicDiv = document.getElementById("dynamicContent");

    let supabase;
    let isSupabaseReady = false;

    try {
        if (!window.supabase) throw new Error("Library Supabase tidak termuat. Cek koneksi internet.");
        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        isSupabaseReady = true;
        dbg('Supabase client OK', '#0f0');
    } catch(e) {
        dbg('createClient GAGAL: ' + e.message, '#ff4444');
        _dbg.style.display = 'block';
        _dbgVisible = true;
        dynamicDiv.innerHTML = `<p style="color:red;padding:20px;">⚠️ Gagal koneksi Supabase: ${e.message}</p>`;
    }

    const KELAS_IDS = ["A","B","C","D"];
    const NAMA_KELAS = { A:"Kelas A", B:"Kelas B", C:"Kelas C", D:"Kelas D" };

    // ========== FUNGSI CRUD SISWA ==========
    async function loadSiswaPerKelas() {
        if (!isSupabaseReady) return { A:[], B:[], C:[], D:[] };
        const { data, error } = await supabase
            .from('siswa')
            .select('id, nama, kelas')
            .order('nama');
        
        if (error) {
            console.error("Load siswa error:", error);
            return { A:[], B:[], C:[], D:[] };
        }
        
        let result = { A:[], B:[], C:[], D:[] };
        data.forEach(s => {
            if (result[s.kelas]) result[s.kelas].push({ id: s.id, nama: s.nama });
        });
        return result;
    }

    async function tambahSiswa(kelas, nama) {
        if (!isSupabaseReady) return null;
        const { data, error } = await supabase
            .from('siswa')
            .insert([{ kelas, nama: nama.trim() }])
            .select()
            .single();
        
        if (error) {
            console.error("Tambah siswa error:", error);
            alert("Gagal menambah siswa: " + error.message);
            return null;
        }
        return { id: data.id, nama: data.nama };
    }

    async function hapusSiswa(siswaId) {
        if (!isSupabaseReady) return;
        const { error } = await supabase
            .from('siswa')
            .delete()
            .eq('id', siswaId);
        
        if (error) console.error("Hapus siswa error:", error);
    }

    // ========== FUNGSI ABSENSI ==========
    async function getAbsensi(kelas, tanggal) {
        if (!isSupabaseReady) return {};
        const { data, error } = await supabase
            .from('absensi')
            .select('santri_id, status')
            .eq('kelas', kelas)
            .eq('tanggal', tanggal);
        
        if (error) {
            console.error("Get absensi error:", error);
            return {};
        }
        
        let map = {};
        data.forEach(a => { map[a.santri_id] = a.status; });
        return map;
    }

    async function updateStatus(kelas, tanggal, santriId, status) {
        if (!isSupabaseReady) return;
        const { error } = await supabase
            .from('absensi')
            .upsert({
                kelas,
                tanggal,
                // FIX: Ensure santri_id is always an integer, not a string from data-id attribute
                santri_id: parseInt(santriId),
                status,
                // FIX: Pass ISO string instead of Date object
                updated_at: new Date().toISOString()
            }, {
                // FIX: onConflict must have NO spaces between column names
                onConflict: 'kelas,tanggal,santri_id'
            });
        
        if (error) console.error("Update status error:", error);
    }

    async function setBulkAbsensi(kelas, tanggal, dataMap) {
        if (!isSupabaseReady) return;
        const records = [];
        for (let [santriId, status] of Object.entries(dataMap)) {
            records.push({
                kelas,
                tanggal,
                // FIX: parseInt was already here, kept as-is (correct)
                santri_id: parseInt(santriId),
                status,
                // FIX: Pass ISO string instead of Date object
                updated_at: new Date().toISOString()
            });
        }
        
        const { error } = await supabase
            .from('absensi')
            .upsert(records, {
                // FIX: onConflict must have NO spaces between column names
                onConflict: 'kelas,tanggal,santri_id'
            });
        
        if (error) console.error("Bulk update error:", error);
    }

    // ========== LAPORAN ==========
    async function getRekapBulanan(kelas, bulanTahun) {
        if (!isSupabaseReady) return { daftarSantri: [], dataAbsen: {}, semuaTanggal: [] };
        
        const [tahun, bulan] = bulanTahun.split("-");
        const daysInMonth = new Date(tahun, bulan, 0).getDate();
        let semuaTanggal = [];
        for (let d = 1; d <= daysInMonth; d++) {
            semuaTanggal.push(`${tahun}-${bulan}-${String(d).padStart(2,'0')}`);
        }
        
        // Ambil semua siswa di kelas ini
        const { data: siswaData, error: siswaError } = await supabase
            .from('siswa')
            .select('id, nama')
            .eq('kelas', kelas);
        
        if (siswaError || !siswaData || !siswaData.length) {
            return { daftarSantri: [], dataAbsen: {}, semuaTanggal };
        }
        
        // Ambil absensi bulan ini
        const startDate = `${tahun}-${bulan}-01`;
        const endDate = `${tahun}-${bulan}-${String(daysInMonth).padStart(2,'0')}`;
        const { data: absData, error: absError } = await supabase
            .from('absensi')
            .select('santri_id, tanggal, status')
            .eq('kelas', kelas)
            .gte('tanggal', startDate)
            .lte('tanggal', endDate);
        
        if (absError) console.error("Get rekap error:", absError);

        let statusMap = {};
        if (absData) {
            absData.forEach(a => {
                if (!statusMap[a.santri_id]) statusMap[a.santri_id] = {};
                statusMap[a.santri_id][a.tanggal] = a.status;
            });
        }

        // FIX: Only include dates that have at least one attendance record
        // so days with no session are not counted as alpha for everyone
        const tanggalDenganData = semuaTanggal.filter(tgl =>
            siswaData.some(s => statusMap[s.id]?.[tgl])
        );
        
        let dataAbsen = {};
        for (let s of siswaData) {
            dataAbsen[s.id] = {};
            for (let tgl of tanggalDenganData) {
                dataAbsen[s.id][tgl] = statusMap[s.id]?.[tgl] || "alpha";
            }
        }
        
        return {
            daftarSantri: siswaData.map(s => ({ id: s.id, nama: s.nama })),
            dataAbsen,
            // FIX: Return only dates that actually have sessions
            semuaTanggal: tanggalDenganData
        };
    }

    async function getRekapSemuaKelas(bulanTahun) {
        let semua = {};
        for (let k of KELAS_IDS) {
            const { daftarSantri, dataAbsen, semuaTanggal } = await getRekapBulanan(k, bulanTahun);
            let totalHadir = 0, totalSakit = 0, totalIzin = 0, totalAlpha = 0;
            for (let s of daftarSantri) {
                for (let tgl of semuaTanggal) {
                    let st = dataAbsen[s.id][tgl];
                    if (st === "hadir") totalHadir++;
                    else if (st === "sakit") totalSakit++;
                    else if (st === "izin") totalIzin++;
                    else totalAlpha++;
                }
            }
            semua[k] = { santriCount: daftarSantri.length, totalHadir, totalSakit, totalIzin, totalAlpha };
        }
        return semua;
    }

    // ========== UI ==========
    let currentTanggalAbsensi = new Date().toISOString().slice(0,10);

    function showEditSiswa() {
        dynamicDiv.innerHTML = `<h2><i class="fas fa-user-graduate"></i> Manajemen Data Siswa</h2><div class="class-buttons" id="kelasSiswaSelector"></div><div id="siswaListContainer"></div>`;
        let activeKelas = "A";
        let siswaDataGlobal = {};
        
        async function refresh() { 
            siswaDataGlobal = await loadSiswaPerKelas(); 
            renderDaftarSiswa(activeKelas); 
        }
        
        function renderKelas() {
            const cont = document.getElementById("kelasSiswaSelector");
            cont.innerHTML = "";
            KELAS_IDS.forEach(k => {
                let btn = document.createElement("button");
                btn.innerText = NAMA_KELAS[k];
                btn.classList.add("class-btn");
                if(k === activeKelas) btn.classList.add("active");
                btn.onclick = async () => { activeKelas = k; renderKelas(); await refresh(); };
                cont.appendChild(btn);
            });
        }
        
        async function renderDaftarSiswa(kelas) {
            let list = siswaDataGlobal[kelas] || [];
            const container = document.getElementById("siswaListContainer");
            container.innerHTML = `<div class="student-form"><input type="text" id="namaSiswaBaru" placeholder="Nama santri baru"><button id="tambahSiswaBtn"><i class="fas fa-plus"></i> Tambah</button></div><table><thead><tr><th>No</th><th>Nama</th><th>Aksi</th></tr></thead><tbody id="siswaTbody"></tbody></table>`;
            const tbody = document.getElementById("siswaTbody");
            function refreshTable() {
                tbody.innerHTML = "";
                list.forEach((s, idx) => {
                    let row = tbody.insertRow();
                    row.insertCell(0).innerText = idx + 1;
                    row.insertCell(1).innerText = s.nama;
                    let del = document.createElement("button");
                    del.innerHTML = '<i class="fas fa-trash"></i> Hapus';
                    del.className = "btn-small";
                    del.style.background = "#c0392b";
                    del.onclick = async () => { 
                        if(confirm(`Hapus ${s.nama}?`)) { 
                            await hapusSiswa(s.id); 
                            await refresh(); 
                            renderDaftarSiswa(activeKelas); 
                        } 
                    };
                    row.insertCell(2).appendChild(del);
                });
            }
            refreshTable();
            document.getElementById("tambahSiswaBtn").onclick = async () => {
                let nama = document.getElementById("namaSiswaBaru").value.trim();
                if(!nama) return alert("Nama kosong");
                await tambahSiswa(kelas, nama);
                await refresh();
                renderDaftarSiswa(activeKelas);
                document.getElementById("namaSiswaBaru").value = "";
            };
        }
        renderKelas();
        refresh();
    }

    async function showAbsensi(kelas) {
        dynamicDiv.innerHTML = `<h2><i class="fas fa-book-open"></i> Absensi ${NAMA_KELAS[kelas]}</h2>
            <div class="date-picker"><label>Tanggal:</label><input type="date" id="tglAbsensi" value="${currentTanggalAbsensi}">
            <button id="refreshAbsensi"><i class="fas fa-sync-alt"></i> Muat</button>
            <button id="simpanSemuaAbsensi" style="background:#2c6e49;"><i class="fas fa-save"></i> Simpan Semua</button></div>
            <div id="absensiTableWrap"><div class="loading">Memuat data...</div></div>
            <div id="alertAbsensi" class="alert"></div>`;
        
        async function loadTable() {
            let tanggal = document.getElementById("tglAbsensi").value;
            currentTanggalAbsensi = tanggal;
            let siswaData = await loadSiswaPerKelas();
            let siswa = siswaData[kelas] || [];
            let absMap = await getAbsensi(kelas, tanggal);
            let wrap = document.getElementById("absensiTableWrap");
            
            if(siswa.length === 0) { 
                wrap.innerHTML = `<p>Belum ada siswa. Tambah di Edit Data Siswa.</p>`; 
                return; 
            }
            
            let html = `<table><thead><tr><th>No</th><th>Nama</th><th>Status</th><th>Aksi</th></tr></thead><tbody>`;
            siswa.forEach((s, idx) => {
                let st = absMap[s.id] || "hadir";
                html += `<tr>
                    <td>${idx + 1}</td>
                    <td>${escapeHtml(s.nama)}</td>
                    <td><select id="stat_${s.id}" class="status-select">
                        <option value="hadir" ${st === 'hadir' ? 'selected' : ''}>✅ Hadir</option>
                        <option value="sakit" ${st === 'sakit' ? 'selected' : ''}>🤒 Sakit</option>
                        <option value="izin" ${st === 'izin' ? 'selected' : ''}>📝 Izin</option>
                        <option value="alpha" ${st === 'alpha' ? 'selected' : ''}>❌ Alpha</option>
                    </select></td>
                    <td><button class="btn-small simpan-satu" data-id="${s.id}"><i class="fas fa-save"></i> Simpan</button></td>
                </tr>`;
            });
            html += `</tbody></table>`;
            wrap.innerHTML = html;
            
            document.querySelectorAll(".simpan-satu").forEach(btn => {
                btn.onclick = async () => {
                    let sid = btn.getAttribute("data-id");
                    let select = document.getElementById(`stat_${sid}`);
                    await updateStatus(kelas, tanggal, sid, select.value);
                    showAlertAbsensi("Tersimpan ✓", "success");
                    loadTable();
                };
            });
        }
        
        async function simpanSemua() {
            let tanggal = document.getElementById("tglAbsensi").value;
            let siswaData = await loadSiswaPerKelas();
            let siswa = siswaData[kelas] || [];
            let newMap = {};
            for(let s of siswa) {
                let sel = document.getElementById(`stat_${s.id}`);
                if(sel) newMap[s.id] = sel.value;
            }
            if(Object.keys(newMap).length) { 
                await setBulkAbsensi(kelas, tanggal, newMap); 
                showAlertAbsensi("Semua tersimpan ✓", "success"); 
                loadTable(); 
            } else {
                showAlertAbsensi("Tidak ada perubahan", "info");
            }
        }
        
        function showAlertAbsensi(msg, type) {
            let el = document.getElementById("alertAbsensi");
            el.style.display = "block";
            el.innerHTML = `<i class="fas fa-info-circle"></i> ${msg}`;
            el.style.background = type === "success" ? "#d1e7dd" : "#fff3cd";
            setTimeout(() => el.style.display = "none", 2000);
        }
        
        document.getElementById("refreshAbsensi").onclick = loadTable;
        document.getElementById("simpanSemuaAbsensi").onclick = simpanSemua;
        loadTable();
    }

    async function showLaporan() {
        // FIX: Default bulan to current month dynamically instead of hardcoded "2026-04"
        const currentMonth = new Date().toISOString().slice(0, 7);

        dynamicDiv.innerHTML = `<h2><i class="fas fa-chart-pie"></i> Laporan Bulanan</h2>
            <div class="class-buttons" id="kelasLaporanSelector"></div>
            <div class="date-picker"><label>Bulan & Tahun:</label><input type="month" id="bulanLaporan" value="${currentMonth}">
            <button id="generateLaporan"><i class="fas fa-chart-bar"></i> Tampilkan Laporan Kelas</button>
            <button id="generateAllLaporan" style="background:#16a085;"><i class="fas fa-chart-line"></i> Tampilkan Ringkasan Semua Kelas</button></div>
            <div id="laporanOutput"></div>
            <div class="footer-actions"><button id="printLaporanBtn"><i class="fas fa-print"></i> Cetak</button><button id="downloadLaporanPdf"><i class="fas fa-file-pdf"></i> Download PDF</button></div>`;
        
        let activeKelas = "A";
        
        function renderKelasLap() {
            const container = document.getElementById("kelasLaporanSelector");
            container.innerHTML = "";
            KELAS_IDS.forEach(k => {
                let btn = document.createElement("button");
                btn.innerText = NAMA_KELAS[k];
                btn.classList.add("class-btn");
                if(k === activeKelas) btn.classList.add("active");
                btn.onclick = () => { activeKelas = k; renderKelasLap(); generateLaporanPerKelas(); };
                container.appendChild(btn);
            });
        }
        
        async function generateLaporanPerKelas() {
            let bulan = document.getElementById("bulanLaporan").value;
            if(!bulan) return;
            document.getElementById("laporanOutput").innerHTML = `<div class="loading">Memuat laporan...</div>`;
            let { daftarSantri, dataAbsen, semuaTanggal } = await getRekapBulanan(activeKelas, bulan);
            
            if(daftarSantri.length === 0) {
                document.getElementById("laporanOutput").innerHTML = `<p>Tidak ada data absensi untuk kelas ${NAMA_KELAS[activeKelas]} pada bulan ${bulan}. Silakan isi absensi terlebih dahulu.</p>`;
                return;
            }

            if(semuaTanggal.length === 0) {
                document.getElementById("laporanOutput").innerHTML = `<p>Belum ada sesi absensi yang tersimpan untuk kelas ${NAMA_KELAS[activeKelas]} pada bulan ${bulan}.</p>`;
                return;
            }
            
            let html = `<h3>📊 Laporan Bulanan ${NAMA_KELAS[activeKelas]} - ${bulan}</h3><div style="overflow-x:auto;"><table border="1"><thead><tr><th>No</th><th>Nama Santri</th>`;
            semuaTanggal.forEach(tgl => html += `<th>${tgl.slice(5)}</th>`);
            html += `<th>H</th><th>S</th><th>I</th><th>A</th></tr></thead><tbody>`;
            
            for(let s of daftarSantri) {
                let h = 0, sakit = 0, izin = 0, alpha = 0;
                html += `<tr><td>${daftarSantri.indexOf(s) + 1}</td><td>${escapeHtml(s.nama)}</td>`;
                for(let tgl of semuaTanggal) {
                    let st = dataAbsen[s.id][tgl];
                    if(st === "hadir") { html += `<td>✅</td>`; h++; }
                    else if(st === "sakit") { html += `<td>🤒</td>`; sakit++; }
                    else if(st === "izin") { html += `<td>📝</td>`; izin++; }
                    else { html += `<td>❌</td>`; alpha++; }
                }
                html += `<td>${h}</td><td>${sakit}</td><td>${izin}</td><td>${alpha}</td></tr>`;
            }
            html += `</tbody></table></div><p><small>✅ Hadir  🤒 Sakit  📝 Izin  ❌ Alpha</small></p>`;
            document.getElementById("laporanOutput").innerHTML = html;
        }
        
        async function generateRingkasanSemuaKelas() {
            let bulan = document.getElementById("bulanLaporan").value;
            if(!bulan) return;
            document.getElementById("laporanOutput").innerHTML = `<div class="loading">Memuat ringkasan semua kelas...</div>`;
            let rekapAll = await getRekapSemuaKelas(bulan);
            let html = `<h3>📋 RINGKASAN SEMUA KELAS - ${bulan}</h3><table border="1"><thead><tr><th>Kelas</th><th>Jml Santri</th><th>Total Hadir</th><th>Total Sakit</th><th>Total Izin</th><th>Total Alpha</th></tr></thead><tbody>`;
            for(let k of KELAS_IDS) {
                let r = rekapAll[k];
                html += `<tr><td>${NAMA_KELAS[k]}</td><td>${r.santriCount}</td><td>${r.totalHadir}</td><td>${r.totalSakit}</td><td>${r.totalIzin}</td><td>${r.totalAlpha}</td></tr>`;
            }
            html += `</tbody></table><p><small>Total dihitung dari seluruh hari yang memiliki sesi absensi dalam bulan ini.</small></p>`;
            document.getElementById("laporanOutput").innerHTML = html;
        }
        
        function downloadAsPDF() {
            const content = document.getElementById("laporanOutput").cloneNode(true);
            if (!content.innerText.trim() || content.innerText.includes("Tidak ada data") || content.innerText.includes("Belum ada")) {
                alert("Tidak ada laporan yang bisa diunduh. Silakan tampilkan laporan terlebih dahulu.");
                return;
            }
            const win = window.open('', '_blank');
            win.document.write(`<html><head><title>Laporan Absensi</title><style>body{font-family:'Segoe UI',sans-serif;padding:20px}table{border-collapse:collapse;width:100%;margin-top:20px}th,td{border:1px solid #000;padding:8px;text-align:center}th{background:#2c3e50;color:white}h3{text-align:center}</style></head><body>${content.outerHTML}</body></html>`);
            win.document.close();
            win.print();
        }
        
        renderKelasLap();
        document.getElementById("generateLaporan").onclick = generateLaporanPerKelas;
        document.getElementById("generateAllLaporan").onclick = generateRingkasanSemuaKelas;
        document.getElementById("printLaporanBtn").onclick = () => {
            let content = document.getElementById("laporanOutput").cloneNode(true);
            let win = window.open('', '_blank');
            win.document.write(`<html><head><title>Laporan Absensi</title><style>table,th,td{border:1px solid #aaa;border-collapse:collapse;padding:6px;text-align:center}</style></head><body>${content.innerHTML}</body></html>`);
            win.document.close(); 
            win.print();
        };
        document.getElementById("downloadLaporanPdf").onclick = downloadAsPDF;
        generateLaporanPerKelas();
    }

    function escapeHtml(str) { 
        return String(str).replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); 
    }
    
    // FIX: localStorage is blocked by Chrome on file:// protocol.
    // Use in-memory variable as primary store; try localStorage as optional bonus.
    let _logoDataUrl = null;

    function storageSave(key, val) {
        try { localStorage.setItem(key, val); } catch(e) {}
    }
    function storageLoad(key) {
        try { return localStorage.getItem(key); } catch(e) { return null; }
    }

    function setupLogo() {
        const logoContainer = document.getElementById("logoContainer");
        const saved = _logoDataUrl || storageLoad("customLogo");
        if (saved) {
            _logoDataUrl = saved;
            logoContainer.innerHTML = `<img src="${saved}" class="logo-img">`;
        }
        logoContainer.onclick = () => {
            const input = document.createElement("input");
            input.type = "file";
            input.accept = "image/*";
            // FIX: Must append to body first — required for file:// in Chrome/Firefox
            input.style.display = "none";
            document.body.appendChild(input);
            input.onchange = e => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = ev => {
                        _logoDataUrl = ev.target.result;
                        storageSave("customLogo", _logoDataUrl);
                        logoContainer.innerHTML = `<img src="${_logoDataUrl}" class="logo-img">`;
                    };
                    reader.readAsDataURL(file);
                }
                document.body.removeChild(input);
            };
            input.click();
        };
    }

    // Event binding
    document.getElementById("btnDataSiswa").onclick = () => { dbg("Klik: Edit Data Siswa"); showEditSiswa(); };
    document.getElementById("btnKelasA").onclick = () => { dbg("Klik: Kelas A"); showAbsensi("A"); };
    document.getElementById("btnKelasB").onclick = () => { dbg("Klik: Kelas B"); showAbsensi("B"); };
    document.getElementById("btnKelasC").onclick = () => { dbg("Klik: Kelas C"); showAbsensi("C"); };
    document.getElementById("btnKelasD").onclick = () => { dbg("Klik: Kelas D"); showAbsensi("D"); };
    document.getElementById("btnLaporan").onclick = () => { dbg("Klik: Laporan"); showLaporan(); };
    dbg("Semua tombol terdaftar ✓", "#0ff");

    setupLogo();
</script>
